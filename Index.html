<body>

<!-- LOADER -->
<div id="loader">
  <div class="l-logo">SENSE3D</div>
  <div class="l-sub">DRAW · DETECT · VISUALIZE</div>
  <div class="l-bar"><div class="l-fill"></div></div>

</div>

<!-- MANY UI PANELS (score HUD, confetti canvas, camera video, canvases etc.) -->
<video id="cam" autoplay playsinline muted></video>
<canvas id="draw-canvas"></canvas>
<canvas id="hand-canvas"></canvas>

<!-- THREE.JS + MEDIAPIPE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
/* ===================================================
   FULL JAVASCRIPT (exact)
   =================================================== */

const PI=Math.PI;

/* --- MATH FUNCTIONS --- */
const M={
  circleSA: r=>4*PI*r*r,
  circleVol:r=>(4/3)*PI*r*r*r,
  squareSA: s=>6*s*s,
  squareVol:s=>s*s*s,
  triSA:(b,h)=>b*b+2*b*Math.sqrt((b/2)**2+h**2),
  triVol:(b,h)=>(1/3)*b*b*h,
  rectSA:(r,h)=>2*PI*r*(r+h),
  rectVol:(r,h)=>PI*r*r*h,
};

const SHAPE_3D  ={circle:'SPHERE',square:'CUBE',triangle:'PYRAMID',rectangle:'CYLINDER',star:'STAR PRISM',heart:'HEART'};
const SHAPE_CLR ={circle:0xe50914,square:0xff6d00,triangle:0x46d369,rectangle:0x00d4ff,star:0xf5c518,heart:0xff1493};

/* --- THREE.JS SETUP --- */
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const cam3d=new THREE.PerspectiveCamera(60,1,0.1,100);
cam3d.position.set(0,0,4);

scene.add(new THREE.AmbientLight(0x222244,2));
const light=new THREE.PointLight(0xffffff,3,25);
light.position.set(3,4,4);
scene.add(light);

/* --- DRAWING + DETECTION STATE --- */
let pts=[],drawing=false,detectedShape=null,currentScale=3;
let mesh3d=null,is3D=false;

/* --- SCALE CONTROL --- */
function setScale(s){
  currentScale=s;
  if(is3D) show3D();
}

/* --- DRAWING CANVAS --- */
const drawCanvas=document.getElementById('draw-canvas');
const dCtx=drawCanvas.getContext('2d');

function redrawTrail(){
  dCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  if(pts.length<2) return;
  dCtx.strokeStyle='#e50914';
  dCtx.lineWidth=5;
  dCtx.beginPath();
  dCtx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    dCtx.lineTo(pts[i].x,pts[i].y);
  }
  dCtx.stroke();
}

/* --- SHOW 3D SHAPE --- */
function show3D(){
  if(mesh3d) scene.remove(mesh3d);

  let geo;
  switch(detectedShape){
    case 'circle': geo=new THREE.SphereGeometry(1*currentScale,32,32); break;
    case 'square': geo=new THREE.BoxGeometry(currentScale,currentScale,currentScale); break;
    case 'triangle': geo=new THREE.ConeGeometry(currentScale, currentScale,4); break;
    case 'rectangle': geo=new THREE.CylinderGeometry(1,1,currentScale,32); break;
    default: geo=new THREE.BoxGeometry(1,1,1);
  }

  const mat=new THREE.MeshStandardMaterial({color:SHAPE_CLR[detectedShape]||0xffffff});
  mesh3d=new THREE.Mesh(geo,mat);
  scene.add(mesh3d);
  is3D=true;
}

/* --- RENDER LOOP --- */
function animate(){
  requestAnimationFrame(animate);
  if(mesh3d){
    mesh3d.rotation.y+=0.01;
    mesh3d.rotation.x+=0.005;
  }
  renderer.render(scene,cam3d);
}
animate();

</script>

</body>
